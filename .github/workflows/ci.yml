# Pinning strategy: version tags + Dependabot (see .github/dependabot.yml)
name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python / Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Installer les dépendances
        run: uv sync --all-groups --locked

      - name: Lint (Ruff)
        run: make lint

  python-format:
    name: Python / Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Installer les dépendances
        run: uv sync --all-groups --locked

      - name: Format (Ruff)
        run: make format

  python-tests:
    name: Python / Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Installer les dépendances
        run: uv sync --all-groups --locked

      - name: Lancer les tests
        run: make test

  python-security:
    name: Python / Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Installer les dépendances
        run: uv sync --all-groups --locked

      - name: Audit des dépendances
        run: make security

  frontend-tests:
    name: Frontend / Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Installer les dépendances npm
        run: npm ci

      - name: Lancer les tests JS
        run: make test-frontend

  docker-build:
    name: Docker / Build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t eventmaps:test .

      - name: Smoke test /health
        run: |
          docker run -d -p 8000:8000 --name eventmaps_test eventmaps:test
          trap 'docker stop eventmaps_test 2>/dev/null || true; docker rm eventmaps_test 2>/dev/null || true' EXIT
          echo "Attente du démarrage du conteneur..."
          for i in $(seq 1 15); do
            if curl --silent --fail --max-time 3 http://localhost:8000/health; then
              echo "Health check OK après $i tentative(s)"
              exit 0
            fi
            echo "Tentative $i/15 échouée, attente 2s..."
            sleep 2
          done
          echo "❌ /health n'a pas répondu après ~75s — logs du conteneur :"
          docker logs eventmaps_test || true
          exit 1
