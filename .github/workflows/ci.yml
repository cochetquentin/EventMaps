name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  python-lint:
    name: Python / Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Installer les dépendances
        run: uv sync --all-groups --locked

      - name: Lint (Ruff)
        run: uv run --locked ruff check .

  python-format:
    name: Python / Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Installer les dépendances
        run: uv sync --all-groups --locked

      - name: Format (Ruff)
        run: uv run --locked ruff format --check .

  python-tests:
    name: Python / Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Installer les dépendances
        run: uv sync --all-groups --locked

      - name: Lancer les tests
        run: uv run --locked python -m pytest --cov=. --cov-fail-under=80 tests/ -v

  python-security:
    name: Python / Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Installer les dépendances
        run: uv sync --all-groups --locked

      - name: Audit des dépendances
        run: uv run --locked pip-audit

  frontend-tests:
    name: Frontend / Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Installer les dépendances npm
        run: npm ci

      - name: Lancer les tests JS
        run: npm test

  docker-build:
    name: Docker / Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t eventmaps:test .

      - name: Smoke test /health
        run: |
          docker run --rm -d -p 8000:8000 --name eventmaps_test eventmaps:test
          sleep 8
          curl --fail http://localhost:8000/health
          docker stop eventmaps_test
