<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventMaps — Tokyo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    :root {
      --bg:     #f6f3ee;
      --glass:  rgba(255,255,255,0.88);
      --text:   #1f2937;
      --muted:  #6b7280;
      --border: rgba(15,23,42,0.08);
      --tc:     #2563eb;
      --hanabi: #f97316;
      --accent: #e11d48;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Outfit", "Noto Sans JP", sans-serif;
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      color: var(--text);
    }

    /* ── Map ── */
    #map { position: absolute; inset: 0; z-index: 0; }

    /* ── Shared glass style ── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
      border-radius: 20px;
    }

    /* ── Top bar ── */
    #top-bar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 1000;
    }

    .bar-row1 {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border-radius: 18px;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.04em;
      white-space: nowrap;
      color: var(--text);
      flex-shrink: 0;
    }

    .brand em { color: var(--accent); font-style: normal; }

    .search-wrap {
      position: relative;
      flex: 1;
    }

    .search-wrap input {
      width: 100%;
      padding: 9px 14px 9px 36px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.7);
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      pointer-events: none;
    }

    #scrape-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 17px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #scrape-btn:hover, #locate-btn:hover { border-color: var(--accent); color: var(--accent); }

    #locate-btn {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--glass);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .m-user {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #6366f1;
      border: 3px solid white;
      box-shadow: 0 2px 12px rgba(99,102,241,0.5);
    }

    #scrape-btn.running {
      animation: spin 1s linear infinite;
      color: var(--accent);
      border-color: var(--accent);
      pointer-events: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Row 2 — filters */
    .bar-row2 {
      margin-top: 8px;
      padding: 10px 14px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border-radius: 16px;
      overflow: hidden;
    }

    .row2-scroll {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .row2-scroll::-webkit-scrollbar { display: none; }

    .row2-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 4px;
    }

    /* Preset buttons */
    .preset-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      line-height: 1;
    }

    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

    .preset-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    #date-custom-btn { font-size: 13px; }

    /* Pills in row2 */
    .pills-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .pill {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      line-height: 1;
    }

    .pill:hover { border-color: #d1d5db; color: var(--text); }

    .pill.active { background: var(--text); color: white; border-color: var(--text); }
    .pill.active.h { background: var(--hanabi); border-color: var(--hanabi); }

    /* Reset */
    #reset-filters {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: inherit;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    #reset-filters:hover { border-color: var(--accent); color: var(--accent); }

    /* Custom date dropdown */
    #date-dropdown {
      margin-top: 8px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border-radius: 14px;
    }

    #date-dropdown.hidden { display: none; }

    .dd-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    input[type="date"] {
      padding: 7px 10px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.8);
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="date"]:focus { border-color: var(--accent); }

    /* ── Bottom bar ── */
    #bottom-bar {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      z-index: 1000;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border-radius: 20px;
      max-height: 320px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #stats {
      font-size: 12px;
      color: var(--muted);
      padding: 12px 16px 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    #stats strong { color: var(--text); }

    #event-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }

    #event-list::-webkit-scrollbar { width: 4px; }
    #event-list::-webkit-scrollbar-track { background: transparent; }
    #event-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

    /* Category groups */
    .cat-group + .cat-group { border-top: 1px solid var(--border); }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .cat-header:hover { background: rgba(0,0,0,0.02); }

    .cat-label {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .cat-count {
      font-size: 11px;
      color: var(--muted);
      background: rgba(0,0,0,0.06);
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 500;
    }

    .cat-chevron {
      font-size: 11px;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .cat-header.collapsed .cat-chevron { transform: rotate(-90deg); }

    .cat-cards {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 16px 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }

    .cat-cards::-webkit-scrollbar { height: 3px; }
    .cat-cards::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
    .cat-cards.hidden { display: none; }

    .event-card {
      flex-shrink: 0;
      width: 210px;
      background: white;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.15s;
    }

    .event-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .event-card.highlighted { border-color: var(--accent); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      margin-bottom: 4px;
    }

    .card-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .card-dot.tc     { background: var(--tc); }
    .card-dot.hanabi { background: var(--hanabi); }

    .card-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      padding-left: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Markers ── */
    .m-tc {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--tc);
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(37,99,235,0.45);
    }

    .m-hanabi {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #ffd699 35%, #f97316 75%);
      box-shadow: 0 0 0 5px rgba(249,115,22,0.15), 0 0 16px rgba(249,115,22,0.55);
      animation: hpulse 2.4s ease-in-out infinite;
    }

    @keyframes hpulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 5px rgba(249,115,22,0.15), 0 0 16px rgba(249,115,22,0.55); }
      50%       { transform: scale(1.12); box-shadow: 0 0 0 8px rgba(249,115,22,0.10), 0 0 24px rgba(249,115,22,0.70); }
    }

    /* ── Clusters ── */
    .marker-cluster { background: rgba(17,24,39,0.07) !important; }
    .marker-cluster div {
      background: #111827 !important;
      color: white !important;
      border: 3px solid white !important;
      font-weight: 700 !important;
      border-radius: 50% !important;
      font-family: "Outfit", sans-serif !important;
      font-size: 13px !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18) !important;
    }

    /* ── Popups ── */
    .leaflet-popup-content-wrapper {
      border-radius: 22px !important;
      padding: 0 !important;
      overflow: hidden !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15) !important;
      border: none !important;
    }

    .leaflet-popup-tip-container { display: none !important; }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }

    .pop { width: 280px; font-family: "Outfit", "Noto Sans JP", sans-serif; }

    .pop-bar { height: 6px; }
    .pop-bar.tc     { background: var(--tc); }
    .pop-bar.hanabi { background: linear-gradient(90deg, #f97316, #fbbf24); }

    .pop-body { padding: 16px 18px 18px; }

    .pop-source { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.3px; margin-bottom: 6px; }
    .pop-source.tc     { color: var(--tc); }
    .pop-source.hanabi { color: var(--hanabi); }

    .pop-title { font-size: 17px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.25; color: var(--text); margin-bottom: 10px; }

    .pop-meta { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 10px; }

    .pop-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

    .pop-badge { font-size: 12px; padding: 3px 9px; border-radius: 8px; background: #f3f4f6; color: var(--text); font-weight: 500; }

    .pop-actions { display: flex; gap: 8px; }

    .pop-btn { flex: 1; padding: 9px 12px; border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 600; text-align: center; text-decoration: none; cursor: pointer; border: none; transition: opacity 0.15s; display: block; }

    .pop-btn:hover { opacity: 0.82; }
    .pop-btn.primary   { background: var(--text); color: white; }
    .pop-btn.secondary { background: #f3f4f6; color: var(--text); }

    /* Leaflet zoom controls */
    .leaflet-top.leaflet-right  { top: 16px; right: 16px; }
    .leaflet-bottom.leaflet-right { right: 16px; bottom: 16px; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- ── Top bar ── -->
<div id="top-bar">
  <div class="bar-row1">
    <div class="brand">Event<em>Maps</em></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Événement, lieu, station…" />
    </div>
    <button id="locate-btn" title="Me localiser">📍</button>
    <button id="scrape-btn" title="Relancer le scraping">↻</button>
  </div>

  <div class="bar-row2">
    <div class="row2-scroll">
      <button class="preset-btn" data-preset="today">Aujourd'hui</button>
      <button class="preset-btn" data-preset="weekend">Ce W-E</button>
      <button class="preset-btn" data-preset="next-weekend">W-E suivant</button>
      <button class="preset-btn" data-preset="week">Cette semaine</button>
      <button class="preset-btn" data-preset="next-week">Sem. suivante</button>
      <button id="date-custom-btn" class="preset-btn">📅 Dates ▾</button>
      <div class="row2-sep"></div>
      <div id="pills" class="pills-row"></div>
      <div class="row2-sep"></div>
      <button id="reset-filters">✕ Reset</button>
    </div>
  </div>

  <div id="date-dropdown" class="hidden">
    <div class="dd-row">
      <span>Du</span>
      <input type="date" id="filter-date-from" />
    </div>
    <div class="dd-row">
      <span>Au</span>
      <input type="date" id="filter-date-to" />
    </div>
  </div>
</div>

<!-- ── Bottom bar ── -->
<div id="bottom-bar">
  <div id="stats">Chargement…</div>
  <div id="event-list"></div>
</div>

<script>
  // ── Map ──────────────────────────────────────────────────────────────
  const map = L.map('map').setView([35.68, 139.69], 11);

  L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png', {
    maxZoom: 20,
    attribution: '© <a href="https://stadiamaps.com/">Stadia Maps</a> © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  }).addTo(map);

  // ── Icons ─────────────────────────────────────────────────────────────
  const iconTC = L.divIcon({ html: '<div class="m-tc"></div>', className: '', iconSize: [16,16], iconAnchor: [8,8], popupAnchor: [0,-12] });
  const iconHanabi = L.divIcon({ html: '<div class="m-hanabi"></div>', className: '', iconSize: [20,20], iconAnchor: [10,10], popupAnchor: [0,-14] });

  // ── Cluster ───────────────────────────────────────────────────────────
  const clusterGroup = L.markerClusterGroup({ chunkedLoading: true, maxClusterRadius: 50 });
  map.addLayer(clusterGroup);

  // ── Constants ─────────────────────────────────────────────────────────
  let allEvents = [];
  const TC_EXCLUDED_CATS = ['fireworks'];

  const CAT_EMOJI = {
    hanabi:'🎆', food:'🍜', art:'🎨', anime:'🎌', beer:'🍺',
    dance:'💃', festival:'🏮', film:'🎬', illumination:'✨',
    living:'🏠', market:'🛍', nature:'🌿', show:'🎭',
    sport:'⚽', theater:'🎭', volunteering:'🤝',
  };

  // ── Popup builder ─────────────────────────────────────────────────────
  function fmtDate(d) { return d || '—'; }

  function parseTimes(ev) {
    if (!ev.times) return ['', ''];
    const idx = ev.times.indexOf('-');
    return idx === -1 ? [ev.times, ''] : [ev.times.slice(0, idx), ev.times.slice(idx + 1)];
  }

  function buildPopup(ev) {
    const attrs = ev.attributes || {};
    if (ev.source === 'tc') {
      const [st, et] = parseTimes(ev);
      const date  = ev.end_date && ev.end_date !== ev.start_date ? `📅 ${fmtDate(ev.start_date)} → ${fmtDate(ev.end_date)}` : `📅 ${fmtDate(ev.start_date)}`;
      const time  = st ? `🕐 ${st}${et ? ' – ' + et : ''}` : '';
      const loc   = attrs.location_name ? `📍 ${attrs.location_name}` : '';
      const meta  = [date, time, loc].filter(Boolean).join('<br>');
      const badge = ev.price ? `<div class="pop-badges"><span class="pop-badge">${ev.price}</span></div>` : '';
      return `<div class="pop"><div class="pop-bar tc"></div><div class="pop-body">
        <div class="pop-source tc">Tokyo Cheapo</div>
        <div class="pop-title">${ev.title}</div>
        <div class="pop-meta">${meta}</div>${badge}
        <div class="pop-actions" style="flex-direction:column;gap:6px;">
          <a class="pop-btn primary" href="${ev.url}" target="_blank">Voir l'événement →</a>
          <div style="display:flex;gap:6px;">
            <a class="pop-btn secondary" href="https://www.google.com/maps/dir/?api=1&destination=${ev.latitude},${ev.longitude}" target="_blank">🗺 Google</a>
            <a class="pop-btn secondary" href="https://maps.apple.com/?daddr=${ev.latitude},${ev.longitude}" target="_blank"> Apple</a>
          </div>
          <a href="/events/${ev.id}.ics" style="font-size:11px;text-align:center;color:var(--muted);text-decoration:underline;">📅 Ajouter au calendrier</a>
        </div></div></div>`;
    } else {
      const [st, et] = parseTimes(ev);
      const date   = `📅 ${fmtDate(ev.start_date)}`;
      const time   = st ? `🕐 ${st}${et ? ' – ' + et : ''}` : '';
      const venue  = ev.venue         ? `📍 ${ev.venue}`         : '';
      const access = attrs.access     ? `🚉 ${attrs.access}`     : '';
      const meta   = [date, time, venue, access].filter(Boolean).join('<br>');
      const bs = [
        attrs.fireworks_count ? `🎇 ${attrs.fireworks_count}` : null,
        attrs.expected_crowd  ? `👥 ${attrs.expected_crowd}`  : null,
        attrs.food_stalls === 'あり'  ? '🍢 Food stalls'  : null,
        attrs.paid_seating === 'あり' ? '🎫 Paid seating' : null,
      ].filter(Boolean);
      const badges = bs.length ? `<div class="pop-badges">${bs.map(b => `<span class="pop-badge">${b}</span>`).join('')}</div>` : '';
      return `<div class="pop"><div class="pop-bar hanabi"></div><div class="pop-body">
        <div class="pop-source hanabi">🎆 Hanabi</div>
        <div class="pop-title">${ev.title}</div>
        <div class="pop-meta">${meta}</div>${badges}
        <div class="pop-actions" style="flex-direction:column;gap:6px;">
          <a class="pop-btn primary" href="${ev.url}" target="_blank">Voir l'événement →</a>
          <div style="display:flex;gap:6px;">
            <a class="pop-btn secondary" href="https://www.google.com/maps/dir/?api=1&destination=${ev.latitude},${ev.longitude}" target="_blank">🗺 Google</a>
            <a class="pop-btn secondary" href="https://maps.apple.com/?daddr=${ev.latitude},${ev.longitude}" target="_blank"> Apple</a>
          </div>
          <a href="/events/${ev.id}.ics" style="font-size:11px;text-align:center;color:var(--muted);text-decoration:underline;">📅 Ajouter au calendrier</a>
        </div></div></div>`;
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────
  function toSlash(d) { return d ? d.replace(/-/g, '/') : null; }

  function getActivePills() {
    const s = new Set();
    document.querySelectorAll('.pill.active').forEach(p => s.add(p.dataset.type));
    return s;
  }

  // ── Render ────────────────────────────────────────────────────────────
  const markerMap = new Map();

  function renderMarkers() {
    const active = getActivePills();
    const fromS  = document.getElementById('filter-date-from').value || null;
    const toS    = document.getElementById('filter-date-to').value   || null;
    const query  = document.getElementById('search-input').value.trim().toLowerCase();

    clusterGroup.clearLayers();
    markerMap.clear();

    const visible = [];

    allEvents.forEach(ev => {
      if (!ev.latitude || !ev.longitude) return;

      const evStart = ev.start_date || ev.date;
      const evEnd   = ev.end_date || evStart;
      if (fromS && evEnd   < fromS) return;
      if (toS   && evStart > toS)   return;

      if (ev.source === 'hanabi') {
        if (!active.has('hanabi')) return;
      } else {
        const cats = ((ev.attributes || {}).categories || []).filter(c => !TC_EXCLUDED_CATS.includes(c));
        const onlyFW = TC_EXCLUDED_CATS.every(c => ((ev.attributes || {}).categories || []).includes(c)) && cats.length === 0;
        if (onlyFW) return;
        if (cats.length > 0 && !cats.some(c => active.has(c))) return;
      }

      if (query) {
        const attrs = ev.attributes || {};
        const hay = [ev.title, attrs.location_name, ev.venue, attrs.access].filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(query)) return;
      }

      const icon   = ev.source === 'tc' ? iconTC : iconHanabi;
      const marker = L.marker([ev.latitude, ev.longitude], { icon });
      marker.bindPopup(buildPopup(ev), { maxWidth: 300, minWidth: 280 });
      clusterGroup.addLayer(marker);
      markerMap.set(ev.id, marker);
      visible.push(ev);
    });

    const tc     = visible.filter(e => e.source === 'tc').length;
    const hanabi = visible.filter(e => e.source === 'hanabi').length;
    document.getElementById('stats').innerHTML =
      `<strong>${visible.length}</strong> événement${visible.length !== 1 ? 's' : ''} &nbsp;·&nbsp; ` +
      `<span style="color:var(--tc)">●</span> ${tc} &nbsp;` +
      `<span style="color:var(--hanabi)">●</span> ${hanabi}`;

    buildEventList(visible);
  }

  // ── Event list (grouped accordion) ───────────────────────────────────
  function buildEventList(events) {
    const list = document.getElementById('event-list');
    list.innerHTML = '';

    if (!events.length) {
      list.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:12px 16px">Aucun événement</div>';
      return;
    }

    // Group by category
    const groups = new Map(); // key → { label, isHanabi, events[] }

    events.forEach(ev => {
      let key;
      if (ev.source === 'hanabi') {
        key = 'hanabi';
        if (!groups.has(key)) groups.set(key, { label: '🎆 Hanabi', isHanabi: true, events: [] });
      } else {
        const cats = ((ev.attributes || {}).categories || []).filter(c => !TC_EXCLUDED_CATS.includes(c));
        key = cats[0] || 'other';
        if (!groups.has(key)) {
          const emoji = CAT_EMOJI[key] || '📌';
          const name  = key === 'other' ? 'Divers' : key.charAt(0).toUpperCase() + key.slice(1);
          groups.set(key, { label: `${emoji} ${name}`, isHanabi: false, events: [] });
        }
      }
      groups.get(key).events.push(ev);
    });

    // Sort groups: hanabi first, then by count desc
    const sorted = [...groups.entries()].sort(([ka, a], [kb, b]) => {
      if (ka === 'hanabi') return -1;
      if (kb === 'hanabi') return  1;
      return b.events.length - a.events.length;
    });

    sorted.forEach(([key, group]) => {
      // Sort events within group by date
      group.events.sort((a, b) => (a.start_date || a.date || '').localeCompare(b.start_date || b.date || ''));

      const groupEl = document.createElement('div');
      groupEl.className = 'cat-group';

      const header = document.createElement('div');
      header.className = 'cat-header';
      header.innerHTML = `
        <span class="cat-label">${group.label}</span>
        <span class="cat-count">${group.events.length}</span>
        <span class="cat-chevron">▾</span>`;

      const cardsRow = document.createElement('div');
      cardsRow.className = 'cat-cards';

      group.events.forEach(ev => {
        const card = document.createElement('div');
        card.className = 'event-card';

        const date = fmtDate(ev.start_date || ev.date);
        const attrs = ev.attributes || {};
        const sub  = ev.source === 'tc'
          ? [attrs.location_name, ev.price].filter(Boolean).join(' · ')
          : [ev.venue, attrs.fireworks_count].filter(Boolean).join(' · ');

        card.innerHTML = `
          <div class="card-header">
            <div class="card-dot ${ev.source}"></div>
            <div class="card-title">${ev.title}</div>
          </div>
          <div class="card-meta">${date}${sub ? ' · ' + sub : ''}</div>`;

        card.addEventListener('click', () => {
          map.setView([ev.latitude, ev.longitude], 15, { animate: true });
          const m = markerMap.get(ev.id);
          if (m) setTimeout(() => m.openPopup(), 350);
          document.querySelectorAll('.event-card').forEach(c => c.classList.remove('highlighted'));
          card.classList.add('highlighted');
          // Expand group if collapsed
          if (cardsRow.classList.contains('hidden')) {
            cardsRow.classList.remove('hidden');
            header.classList.remove('collapsed');
          }
          card.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
        });

        cardsRow.appendChild(card);
      });

      header.addEventListener('click', () => {
        const isCollapsed = cardsRow.classList.toggle('hidden');
        header.classList.toggle('collapsed', isCollapsed);
      });

      groupEl.appendChild(header);
      groupEl.appendChild(cardsRow);
      list.appendChild(groupEl);
    });
  }

  // ── Pills builder ─────────────────────────────────────────────────────
  const deactivatedPills = new Set();

  function buildPills() {
    const container = document.getElementById('pills');
    container.innerHTML = '';

    addPill(container, 'hanabi', '🎆 Hanabi', true);

    const catCounts = {};
    allEvents.forEach(ev => {
      if (ev.source !== 'tc') return;
      ((ev.attributes || {}).categories || []).forEach(c => { catCounts[c] = (catCounts[c] || 0) + 1; });
    });

    Object.entries(catCounts)
      .filter(([c]) => !TC_EXCLUDED_CATS.includes(c))
      .sort((a, b) => b[1] - a[1])
      .forEach(([cat]) => addPill(container, cat, `${CAT_EMOJI[cat] || ''} ${cat}`));

    // Restore deactivated state after rebuild
    container.querySelectorAll('.pill').forEach(p => {
      if (deactivatedPills.has(p.dataset.type)) p.classList.remove('active');
    });
  }

  function addPill(container, type, label, isHanabi = false) {
    const btn = document.createElement('button');
    btn.className = 'pill active' + (isHanabi ? ' h' : '');
    btn.dataset.type = type;
    btn.textContent = label;
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if (btn.classList.contains('active')) deactivatedPills.delete(type);
      else deactivatedPills.add(type);
      renderMarkers();
    });
    container.appendChild(btn);
  }

  // ── Date custom toggle ────────────────────────────────────────────────
  document.getElementById('date-custom-btn').addEventListener('click', () => {
    document.getElementById('date-dropdown').classList.toggle('hidden');
  });

  // ── JST dates ────────────────────────────────────────────────────────
  function todayJST() {
    const now = new Date();
    const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
    jst.setUTCHours(0, 0, 0, 0);
    return jst;
  }

  function addDays(d, n) { return new Date(d.getTime() + n * 24 * 60 * 60 * 1000); }
  function isoDate(d) { return d.toISOString().slice(0, 10); }

  function computePresets() {
    const today = todayJST();
    const dow = today.getUTCDay();
    const daysFromMon = dow === 0 ? 6 : dow - 1;
    const mon  = addDays(today, -daysFromMon);
    return {
      today:          [isoDate(today),         isoDate(today)],
      weekend:        [isoDate(addDays(mon,5)), isoDate(addDays(mon,6))],
      'next-weekend': [isoDate(addDays(mon,12)),isoDate(addDays(mon,13))],
      week:           [isoDate(mon),            isoDate(addDays(mon,6))],
      'next-week':    [isoDate(addDays(mon,7)), isoDate(addDays(mon,13))],
    };
  }

  const PRESETS = computePresets();

  function applyPreset(name) {
    const [from, to] = PRESETS[name];
    document.getElementById('filter-date-from').value = from;
    document.getElementById('filter-date-to').value   = to;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === name));
    renderMarkers();
  }

  document.querySelectorAll('.preset-btn[data-preset]').forEach(btn => {
    btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
  });

  document.getElementById('filter-date-from').addEventListener('change', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    // start_from changed → server-side lower bound changes → re-fetch
    clearTimeout(fetchDebounceTimer);
    fetchDebounceTimer = setTimeout(fetchEventsByBbox, 300);
  });

  document.getElementById('filter-date-to').addEventListener('change', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    renderMarkers();
  });

  // ── Reset ─────────────────────────────────────────────────────────────
  document.getElementById('reset-filters').addEventListener('click', () => {
    document.getElementById('filter-date-from').value = isoDate(todayJST());
    document.getElementById('filter-date-to').value   = '';
    document.getElementById('search-input').value     = '';
    deactivatedPills.clear();
    document.querySelectorAll('.pill').forEach(p => p.classList.add('active'));
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('date-dropdown').classList.add('hidden');
    // Programmatic .value change doesn't fire 'change' → trigger fetch manually
    clearTimeout(fetchDebounceTimer);
    fetchDebounceTimer = setTimeout(fetchEventsByBbox, 300);
  });

  // ── Listeners ─────────────────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', renderMarkers);

  // ── Bbox fetch ────────────────────────────────────────────────────────
  let bboxFetchEnabled = false;
  let fetchDebounceTimer = null;
  let bboxFetchController = null;

  async function fetchEventsByBbox() {
    if (bboxFetchController) bboxFetchController.abort();
    bboxFetchController = new AbortController();
    const signal = bboxFetchController.signal;
    try {
      const b = map.getBounds(), sw = b.getSouthWest(), ne = b.getNorthEast();
      const minLon = Math.max(-180, sw.lng), maxLon = Math.min(180, ne.lng);
      const minLat = Math.max(-90,  sw.lat), maxLat = Math.min(90,  ne.lat);
      // If the clamped box is degenerate (whole-world zoom or wrapped edge),
      // fall back to no-bbox so the server returns all upcoming events.
      const bbox = (minLon < maxLon && minLat < maxLat)
        ? `${minLon},${minLat},${maxLon},${maxLat}`
        : null;
      const PAGE = 500;
      const events = [];
      let offset = 0;
      while (true) {
        const params = { limit: String(PAGE), offset: String(offset) };
        if (bbox) params.bbox = bbox;
        const fromS = document.getElementById('filter-date-from').value;
        if (fromS) params.start_from = fromS;
        const res = await fetch(`/events?${new URLSearchParams(params)}`, { signal });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const page = await res.json();
        events.push(...page);
        if (page.length < PAGE) break;
        offset += PAGE;
      }
      allEvents = events;
      buildPills();
      renderMarkers();
    } catch (e) {
      if (e.name === 'AbortError') return;
      document.getElementById('stats').textContent = 'Erreur de chargement.';
      console.error(e);
    }
  }

  map.on('moveend', () => {
    if (!bboxFetchEnabled) return;
    clearTimeout(fetchDebounceTimer);
    fetchDebounceTimer = setTimeout(fetchEventsByBbox, 300);
  });

  // ── Init ──────────────────────────────────────────────────────────────
  async function loadEvents() {
    document.getElementById('filter-date-from').value = isoDate(todayJST());
    try {
      await fetchEventsByBbox();
      bboxFetchEnabled = true;
    } catch (e) {
      document.getElementById('stats').textContent = 'Erreur de chargement.';
      console.error(e);
    }
  }

  // ── Geolocation ───────────────────────────────────────────────────────
  const iconUser = L.divIcon({ html: '<div class="m-user"></div>', className: '', iconSize: [20, 20], iconAnchor: [10, 10] });
  let userMarker = null;

  document.getElementById('locate-btn').addEventListener('click', () => {
    if (!navigator.geolocation) {
      alert('La géolocalisation n\'est pas supportée par ce navigateur.');
      return;
    }
    const btn = document.getElementById('locate-btn');
    btn.textContent = '⏳';
    btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        btn.textContent = '📍';
        btn.disabled = false;
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([lat, lng], { icon: iconUser })
          .bindPopup('📍 Vous êtes ici').addTo(map);
        map.setView([lat, lng], 13, { animate: true });
      },
      (err) => {
        btn.textContent = '📍';
        btn.disabled = false;
        alert('Impossible d\'obtenir votre position : ' + err.message);
      },
      { timeout: 10000, maximumAge: 60000 }
    );
  });

  // ── Scrape button ─────────────────────────────────────────────────────
  const scrapeBtn = document.getElementById('scrape-btn');
  let pollInterval = null;

  async function startScrape() {
    scrapeBtn.classList.add('running');
    await fetch('/scrape', { method: 'POST' });
    pollInterval = setInterval(async () => {
      const res  = await fetch('/scrape/status');
      const data = await res.json();
      if (data.status !== 'running') {
        clearInterval(pollInterval);
        scrapeBtn.classList.remove('running');
        await loadEvents();
      }
    }, 2000);
  }

  scrapeBtn.addEventListener('click', startScrape);

  loadEvents();
</script>
</body>
</html>
