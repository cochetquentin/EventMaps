<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f4eee2" />
  <title>EventMaps — Tokyo</title>

  <!-- Google Fonts: SRI non applicable (réponse dynamique selon le navigateur) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;450;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
        crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
          crossorigin="anonymous"></script>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV"
        crossorigin="anonymous" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        integrity="sha384-wgw+aLYNQ7dlhK47ZPK7FRACiq7ROZwgFNg0m04avm4CaXS+Z9Y7nMu8yNjBKYC+"
        crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
          integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr"
          crossorigin="anonymous"></script>

  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ── Map (cadre inset) ── -->
<div id="map"></div>

<!-- ── Header ── -->
<header id="app-header">
  <div class="header-main">
    <div class="brand">
      <span class="brand-seal" aria-hidden="true">祭</span>
      <span class="brand-word">Event<em>Maps</em></span>
      <span class="brand-sub">Tokyo</span>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Un événement, un lieu, une station…" />
    </div>

    <!-- Espace flexible : pousse météo + boutons à droite, laisse le centre libre -->
    <div class="header-fill" aria-hidden="true"></div>

    <!-- Widget météo Tokyo (desktop) — masqué tant que les données ne sont pas chargées -->
    <div id="weather" class="weather" hidden></div>

    <div class="header-actions">
      <button id="search-toggle" class="icon-btn" title="Rechercher" aria-label="Ouvrir la recherche" aria-expanded="false">
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
      </button>
      <button id="filters-toggle" class="icon-btn" title="Filtres" aria-label="Afficher les filtres" aria-expanded="false">
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><polygon points="21 4 3 4 10 12.5 10 19 14 21 14 12.5 21 4"/></svg>
      </button>
      <button id="locate-btn" class="icon-btn" title="Me localiser" aria-label="Me localiser">
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="7"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><circle class="ico-fill" cx="12" cy="12" r="2.4"/></svg>
      </button>
      <button id="scrape-btn" class="icon-btn" title="Relancer le scraping" aria-label="Rafraîchir les données">
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.7 9.7 0 0 1 6.7 2.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.7 9.7 0 0 1-6.7-2.7L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
    </div>
  </div>

  <div class="header-filters">
    <div class="segmented" role="group" aria-label="Périodes">
      <button class="preset-btn" data-preset="today">Aujourd'hui</button>
      <button class="preset-btn" data-preset="weekend">Ce W-E</button>
      <button class="preset-btn" data-preset="next-weekend">W-E suivant</button>
      <button class="preset-btn" data-preset="week">Cette semaine</button>
      <button class="preset-btn" data-preset="next-week">Sem. suivante</button>
    </div>

    <div class="filter-dates">
      <div class="dd-row">
        <span>Du</span>
        <input type="date" id="filter-date-from" />
      </div>
      <div class="dd-row">
        <span>Au</span>
        <input type="date" id="filter-date-to" />
      </div>
    </div>

    <button id="toggle-cats" class="chip-ghost" title="Tout sélectionner / désélectionner">Aucune</button>

    <div id="pills" class="pills-row"></div>

    <button id="reset-filters" class="chip-ghost" aria-label="Réinitialiser les filtres">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      <span>Réinit.</span>
    </button>
  </div>
</header>

<!-- ── Panneau liste ── -->
<aside id="list-panel">
  <div class="sheet-handle" aria-hidden="true"><span class="sheet-grip"></span></div>
  <div class="list-head">
    <div id="stats">Chargement…</div>
    <button id="scope-toggle" class="scope-toggle" type="button" aria-pressed="false"
            title="Basculer entre les événements de la zone visible et tous les événements filtrés">
      <span class="scope-label">📍 Zone visible</span>
    </button>
  </div>
  <div id="event-list"></div>
</aside>

<!-- ── Event Drawer ── -->
<div id="event-drawer">
  <div class="drawer-backdrop"></div>
  <div class="drawer-panel">
    <div class="drawer-source-bar"></div>
    <div class="drawer-header">
      <div class="drawer-title-row">
        <span class="drawer-source-label"></span>
        <button id="drawer-close" class="icon-btn ghost" title="Fermer" aria-label="Fermer">
          <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <h2 class="drawer-title"></h2>
    </div>
    <div class="drawer-body">
      <div class="drawer-meta"></div>
      <div class="drawer-description drawer-section" style="display:none">
        <div class="drawer-section-title">Description</div>
        <div class="drawer-section-content"></div>
      </div>
      <div class="drawer-attributes"></div>
    </div>
    <div class="drawer-actions">
      <a class="pop-btn primary drawer-link-event" href="#" target="_blank" rel="noopener">Voir l'événement →</a>
      <div class="drawer-actions-row">
        <a class="pop-btn secondary drawer-link-google" href="#" target="_blank" rel="noopener">Google Maps</a>
        <a class="pop-btn secondary drawer-link-apple" href="#" target="_blank" rel="noopener">Apple Maps</a>
      </div>
      <a class="drawer-link-ical" href="#">Ajouter au calendrier</a>
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
