<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventMaps — Tokyo</title>

  <!-- Google Fonts: SRI non applicable (réponse dynamique selon le navigateur) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
        crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
          crossorigin="anonymous"></script>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV"
        crossorigin="anonymous" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        integrity="sha384-wgw+aLYNQ7dlhK47ZPK7FRACiq7ROZwgFNg0m04avm4CaXS+Z9Y7nMu8yNjBKYC+"
        crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
          integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr"
          crossorigin="anonymous"></script>

  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div id="map"></div>

<!-- ── Top bar ── -->
<div id="top-bar">
  <div class="bar-row1">
    <div class="brand">Event<em>Maps</em></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Événement, lieu, station…" />
    </div>
    <button id="locate-btn" title="Me localiser">📍</button>
    <button id="scrape-btn" title="Relancer le scraping">↻</button>
  </div>

  <div class="bar-row2">
    <div class="row2-scroll">
      <button class="preset-btn" data-preset="today">Aujourd'hui</button>
      <button class="preset-btn" data-preset="weekend">Ce W-E</button>
      <button class="preset-btn" data-preset="next-weekend">W-E suivant</button>
      <button class="preset-btn" data-preset="week">Cette semaine</button>
      <button class="preset-btn" data-preset="next-week">Sem. suivante</button>
      <button id="date-custom-btn" class="preset-btn">📅 Dates ▾</button>
      <div class="row2-sep"></div>
      <div id="pills" class="pills-row"></div>
      <div class="row2-sep"></div>
      <button id="reset-filters">✕ Reset</button>
      <button id="copy-link-btn" title="Copier le lien">🔗</button>
      <button id="export-ics-btn" title="Exporter la liste filtrée au format ICS">📅 ICS</button>
    </div>
  </div>

  <div id="date-dropdown" class="hidden">
    <div class="dd-row">
      <span>Du</span>
      <input type="date" id="filter-date-from" />
    </div>
    <div class="dd-row">
      <span>Au</span>
      <input type="date" id="filter-date-to" />
    </div>
  </div>
</div>

<!-- ── Bottom bar ── -->
<div id="bottom-bar">
  <div id="stats">Chargement…</div>
  <div id="event-list"></div>
</div>

<!-- ── Event Drawer ── -->
<div id="event-drawer">
  <div class="drawer-backdrop"></div>
  <div class="drawer-panel">
    <div class="drawer-source-bar"></div>
    <div class="drawer-header">
      <div class="drawer-title-row">
        <span class="drawer-source-label"></span>
        <button id="drawer-close" title="Fermer">✕</button>
      </div>
      <h2 class="drawer-title"></h2>
    </div>
    <div class="drawer-body">
      <div class="drawer-meta"></div>
      <div class="drawer-description drawer-section" style="display:none">
        <div class="drawer-section-title">Description</div>
        <div class="drawer-section-content"></div>
      </div>
      <div class="drawer-attributes"></div>
    </div>
    <div class="drawer-actions">
      <a class="pop-btn primary drawer-link-event" href="#" target="_blank" rel="noopener">Voir l'événement →</a>
      <div style="display:flex;gap:8px">
        <a class="pop-btn secondary drawer-link-google" href="#" target="_blank" rel="noopener" style="flex:1">🗺 Google Maps</a>
        <a class="pop-btn secondary drawer-link-apple" href="#" target="_blank" rel="noopener" style="flex:1"> Apple Maps</a>
      </div>
      <a class="drawer-link-ical" href="#" style="font-size:11px;text-align:center;color:var(--muted);text-decoration:underline">📅 Ajouter au calendrier</a>
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
