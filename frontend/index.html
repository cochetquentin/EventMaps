<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventMaps — Tokyo</title>

  <!-- Google Fonts: SRI non applicable (réponse dynamique selon le navigateur) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
        crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
          crossorigin="anonymous"></script>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV"
        crossorigin="anonymous" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        integrity="sha384-wgw+aLYNQ7dlhK47ZPK7FRACiq7ROZwgFNg0m04avm4CaXS+Z9Y7nMu8yNjBKYC+"
        crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
          integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr"
          crossorigin="anonymous"></script>

  <style>
    :root {
      --bg:     #f6f3ee;
      --glass:  rgba(255,255,255,0.88);
      --text:   #1f2937;
      --muted:  #6b7280;
      --border: rgba(15,23,42,0.08);
      --tc:     #2563eb;
      --hanabi: #f97316;
      --accent: #e11d48;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Outfit", "Noto Sans JP", sans-serif;
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      color: var(--text);
    }

    /* ── Map ── */
    #map { position: absolute; inset: 0; z-index: 0; }

    /* ── Shared glass style ── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
      border-radius: 20px;
    }

    /* ── Top bar ── */
    #top-bar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 1000;
    }

    .bar-row1 {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border-radius: 18px;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.04em;
      white-space: nowrap;
      color: var(--text);
      flex-shrink: 0;
    }

    .brand em { color: var(--accent); font-style: normal; }

    .search-wrap {
      position: relative;
      flex: 1;
    }

    .search-wrap input {
      width: 100%;
      padding: 9px 14px 9px 36px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.7);
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      pointer-events: none;
    }

    #scrape-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 17px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #scrape-btn:hover, #locate-btn:hover { border-color: var(--accent); color: var(--accent); }

    #locate-btn {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--glass);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .m-user {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #6366f1;
      border: 3px solid white;
      box-shadow: 0 2px 12px rgba(99,102,241,0.5);
    }

    #scrape-btn.running {
      animation: spin 1s linear infinite;
      color: var(--accent);
      border-color: var(--accent);
      pointer-events: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Row 2 — filters */
    .bar-row2 {
      margin-top: 8px;
      padding: 10px 14px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border-radius: 16px;
      overflow: hidden;
    }

    .row2-scroll {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .row2-scroll::-webkit-scrollbar { display: none; }

    .row2-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 4px;
    }

    /* Preset buttons */
    .preset-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      line-height: 1;
    }

    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

    .preset-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    #date-custom-btn { font-size: 13px; }

    /* Pills in row2 */
    .pills-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .pill {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      line-height: 1;
    }

    .pill:hover { border-color: #d1d5db; color: var(--text); }

    .pill.active { background: var(--text); color: white; border-color: var(--text); }
    .pill.active.h { background: var(--hanabi); border-color: var(--hanabi); }

    /* Reset */
    #reset-filters {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: inherit;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    #reset-filters:hover { border-color: var(--accent); color: var(--accent); }

    /* Custom date dropdown */
    #date-dropdown {
      margin-top: 8px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border-radius: 14px;
    }

    #date-dropdown.hidden { display: none; }

    .dd-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    input[type="date"] {
      padding: 7px 10px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.8);
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="date"]:focus { border-color: var(--accent); }

    /* ── Bottom bar ── */
    #bottom-bar {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      z-index: 1000;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border-radius: 20px;
      max-height: 320px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #stats {
      font-size: 12px;
      color: var(--muted);
      padding: 12px 16px 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    #stats strong { color: var(--text); }

    #event-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }

    #event-list::-webkit-scrollbar { width: 4px; }
    #event-list::-webkit-scrollbar-track { background: transparent; }
    #event-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

    /* Category groups */
    .cat-group + .cat-group { border-top: 1px solid var(--border); }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .cat-header:hover { background: rgba(0,0,0,0.02); }

    .cat-label {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .cat-count {
      font-size: 11px;
      color: var(--muted);
      background: rgba(0,0,0,0.06);
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 500;
    }

    .cat-chevron {
      font-size: 11px;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .cat-header.collapsed .cat-chevron { transform: rotate(-90deg); }

    .cat-cards {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 16px 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }

    .cat-cards::-webkit-scrollbar { height: 3px; }
    .cat-cards::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
    .cat-cards.hidden { display: none; }

    .event-card {
      flex-shrink: 0;
      width: 210px;
      background: white;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.15s;
    }

    .event-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .event-card.highlighted { border-color: var(--accent); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      margin-bottom: 4px;
    }

    .card-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .card-dot.tc     { background: var(--tc); }
    .card-dot.hanabi { background: var(--hanabi); }

    .card-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      padding-left: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Markers ── */
    .m-tc {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--tc);
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(37,99,235,0.45);
    }

    .m-hanabi {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #ffd699 35%, #f97316 75%);
      box-shadow: 0 0 0 5px rgba(249,115,22,0.15), 0 0 16px rgba(249,115,22,0.55);
      animation: hpulse 2.4s ease-in-out infinite;
    }

    @keyframes hpulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 5px rgba(249,115,22,0.15), 0 0 16px rgba(249,115,22,0.55); }
      50%       { transform: scale(1.12); box-shadow: 0 0 0 8px rgba(249,115,22,0.10), 0 0 24px rgba(249,115,22,0.70); }
    }

    /* ── Clusters ── */
    .marker-cluster { background: rgba(17,24,39,0.07) !important; }
    .marker-cluster div {
      background: #111827 !important;
      color: white !important;
      border: 3px solid white !important;
      font-weight: 700 !important;
      border-radius: 50% !important;
      font-family: "Outfit", sans-serif !important;
      font-size: 13px !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18) !important;
    }

    /* ── Popups ── */
    .leaflet-popup-content-wrapper {
      border-radius: 22px !important;
      padding: 0 !important;
      overflow: hidden !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15) !important;
      border: none !important;
    }

    .leaflet-popup-tip-container { display: none !important; }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }

    .pop { width: 280px; font-family: "Outfit", "Noto Sans JP", sans-serif; }

    .pop-bar { height: 6px; }
    .pop-bar.tc     { background: var(--tc); }
    .pop-bar.hanabi { background: linear-gradient(90deg, #f97316, #fbbf24); }

    .pop-body { padding: 16px 18px 18px; }

    .pop-source { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.3px; margin-bottom: 6px; }
    .pop-source.tc     { color: var(--tc); }
    .pop-source.hanabi { color: var(--hanabi); }

    .pop-title { font-size: 17px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.25; color: var(--text); margin-bottom: 10px; }

    .pop-meta { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 10px; }

    .pop-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

    .pop-badge { font-size: 12px; padding: 3px 9px; border-radius: 8px; background: #f3f4f6; color: var(--text); font-weight: 500; }

    .pop-actions { display: flex; gap: 8px; }

    .pop-btn { flex: 1; padding: 9px 12px; border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 600; text-align: center; text-decoration: none; cursor: pointer; border: none; transition: opacity 0.15s; display: block; }

    .pop-btn:hover { opacity: 0.82; }
    .pop-btn.primary   { background: var(--text); color: white; }
    .pop-btn.secondary { background: #f3f4f6; color: var(--text); }

    /* Leaflet zoom controls */
    .leaflet-top.leaflet-right  { top: 16px; right: 16px; }
    .leaflet-bottom.leaflet-right { right: 16px; bottom: 16px; }

    /* ── Favorites ── */
    .m-fav {
      outline: 2.5px solid #fbbf24;
      outline-offset: 2px;
    }
    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      color: var(--muted);
      transition: color 0.15s, transform 0.15s;
    }
    .fav-btn:hover { transform: scale(1.2); }
    .fav-btn.active { color: #fbbf24; }
    .card-header .fav-btn { margin-left: auto; font-size: 14px; flex-shrink: 0; }
    .fav-pill.active { background: #fbbf24 !important; border-color: #f59e0b !important; color: #1f2937 !important; }
    .pop-fav-btn {
      flex-shrink: 0;
      width: 38px;
      border-radius: 12px;
      background: #f3f4f6;
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pop-fav-btn.active { background: #fef3c7; color: #f59e0b; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- ── Top bar ── -->
<div id="top-bar">
  <div class="bar-row1">
    <div class="brand">Event<em>Maps</em></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Événement, lieu, station…" />
    </div>
    <button id="locate-btn" title="Me localiser">📍</button>
    <button id="scrape-btn" title="Relancer le scraping">↻</button>
  </div>

  <div class="bar-row2">
    <div class="row2-scroll">
      <button class="preset-btn" data-preset="today">Aujourd'hui</button>
      <button class="preset-btn" data-preset="weekend">Ce W-E</button>
      <button class="preset-btn" data-preset="next-weekend">W-E suivant</button>
      <button class="preset-btn" data-preset="week">Cette semaine</button>
      <button class="preset-btn" data-preset="next-week">Sem. suivante</button>
      <button id="date-custom-btn" class="preset-btn">📅 Dates ▾</button>
      <div class="row2-sep"></div>
      <div id="pills" class="pills-row"></div>
      <div class="row2-sep"></div>
      <button id="reset-filters">✕ Reset</button>
    </div>
  </div>

  <div id="date-dropdown" class="hidden">
    <div class="dd-row">
      <span>Du</span>
      <input type="date" id="filter-date-from" />
    </div>
    <div class="dd-row">
      <span>Au</span>
      <input type="date" id="filter-date-to" />
    </div>
  </div>
</div>

<!-- ── Bottom bar ── -->
<div id="bottom-bar">
  <div id="stats">Chargement…</div>
  <div id="event-list"></div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
